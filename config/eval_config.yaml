# Evaluation configuration file

# Evaluation metrics
metrics:
  - "execution_accuracy"  # EX metric: execution accuracy

# Ablation experiment configurations
ablation_configs:
  base:
    name: "Base"
    description: "Question + Schema"
    use_rag: false
    use_keyword: false
  
  rag:
    name: "+RAG"
    description: "Question + Schema + RAG"
    use_rag: true
    use_keyword: false
  
  keyword:
    name: "+Keyword"
    description: "Question + Schema + Keyword"
    use_rag: false
    use_keyword: true
  
  full:
    name: "+Both"
    description: "Question + Schema + RAG + Keyword"
    use_rag: true
    use_keyword: true

  prompt_enhanced:
    name: "Enhanced Prompt"
    description: "Question + Schema + dataset-specific prompt enhancement"
    use_rag: false
    use_keyword: false
    prompt_style: "prompt_enhanced"

# Default configuration list
default_configs:
  - "base"

prompt_styles:
  default:
    template_path: "prompts/text2sql_prompt.txt"
    include_sample_data: true
    use_dataset_context: false

  prompt_enhanced:
    template_path: "prompts/text2sql_prompt.txt"
    include_sample_data: true
    use_dataset_context: false
    dataset_specific: true

# RAG configuration
rag:
  top_k: 5  # Return the top 5 most relevant documents
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  vector_db_path: "data/indexes/vector/chroma"
  doc_source: "data/postgis_extracted.json"
  chunk_strategy: "function_id"  # Split by function_id

# Keyword search configuration
keyword_search:
  top_k: 3  # Return the top 3 most relevant results
  method: "tfidf"  # Use the TF-IDF method
  doc_source: "data/postgis_extracted.json"

floodsql_pg:
  metadata:
    doc_source: "../FloodSQL-Bench/data/metadata_parquet.json"
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    vector_db_path: "data/indexes/vector/floodsql"
    table_top_k_by_level:
      L0: 3
      L1: 4
      L2: 4
      L3: 5
      L4: 5
      L5: 5
    column_top_k: 5

# Evaluation runtime configuration
evaluation:
  timeout: 60  # SQL execution timeout in seconds
  parallel_workers: 4  # Number of parallel evaluation workers
  save_details: true  # Whether to save detailed results

prediction_postprocess:
  enable_spatialsql_normalization: true
  enable_floodsql_normalization: true

# Result output configuration
results:
  output_dir: "results"
  tasks_dir: "results/tasks"
  benchmarks_dir: "results/benchmarks"
  sessions_dir: "results/sessions"
