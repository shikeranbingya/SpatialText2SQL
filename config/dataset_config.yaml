# Dataset configuration file
datasets:
  spatial_qa:
    type: "excel"
    loader_class: "SpatialQALoader"
    data_path: "Spatial QA"
    database: "postgres"  # Use the postgres database
    levels: [1, 2, 3]
    columns:
      question: "Question"
      sql: "Reviewed Query"  # Use the reviewed canonical SQL
    grouping:
      fields: ["level"]
      values:
        level: [1, 2, 3]

  # SpatialSQL dataset (extended: QA-*.txt under sdbdatasets, evaluated after migration to PostgreSQL/PostGIS)
  spatialsql_pg:
    type: "qa_txt"
    loader_class: "SpatialSQLLoader"
    data_path: "sdbdatasets"
    database: "spatial_sql"  # Use the dedicated spatial_sql database
    use_chinese_question: false
    use_sql_dialect_adapter: true  # Persist queries after SpatiaLite -> PostGIS conversion
    dataset_versions: ["dataset1", "dataset2"]
    domains: ["ada", "edu", "tourism", "traffic"]
    grouping:
      fields: ["split"]
      values:
        split:
          - "dataset1_ada"
          - "dataset1_edu"
          - "dataset1_tourism"
          - "dataset1_traffic"
          - "dataset2_ada"
          - "dataset2_edu"
          - "dataset2_tourism"
          - "dataset2_traffic"

  floodsql_pg:
    type: "benchmark_json"
    loader_class: "FloodSQLLoader"
    data_path: "../FloodSQL-Bench"
    database: "floodsql"
    use_sql_dialect_adapter: true
    sql_dialect_adapter: "duckdb_to_postgis"
    grouping:
      fields: ["level"]
      values:
        level: ["L0", "L1", "L2", "L3", "L4", "L5"]

# Default dataset (kept unchanged for the original workflow)
default_dataset: "spatial_qa"

# Data preprocessing configuration
preprocessing:
  extract_schema: true  # Whether to extract schema information
  schema_cache_dir: "data/schemas"  # Schema cache directory
  output_dir: "data/preprocessed"  # Preprocessing output directory
