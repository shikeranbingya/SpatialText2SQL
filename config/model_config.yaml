# Model configuration file
#
# Notes:
# 1. Models with paper_group=open_source will be exported into the open-source table used for paper figures.
# 2. For service endpoints that are not fixed inside the repository yet, api_base/model use explicit placeholder values and should be replaced before running real experiments.

default_backend: "vllm"

models:
  qwen2.5-coder-7b:
    display_name: "Qwen2.5-Coder-7B-Instruct"
    size_label: "7B"
    paper_group: "open_source"
    paper_order: 10
    model_type: "causal_lm"
    tokenizer_name_or_path: "Qwen/Qwen2.5-Coder-7B-Instruct"
    generation_config:
      max_new_tokens: 2048
      temperature: 0.0
      top_p: 1.0
      do_sample: false
      repetition_penalty: 1.0
    backends:
      vllm:
        loader_class: "VllmOpenAILoader"
        api_base: "http://10.132.80.118:8000/v1"
        model: "/data/llm/qwen/Qwen2.5-Coder-7B-Instruct"
        api_key: ""
        timeout: 600
      transformers:
        loader_class: "QwenModelLoader"
        model_path: "~/.cache/huggingface/hub/models--Qwen--Qwen2.5-Coder-7B/snapshots/0396a76181e127dfc13e5c5ec48a8cee09938b02"
        device_map: "auto"

