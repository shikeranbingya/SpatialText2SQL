# Database connection configuration with multi-database support
databases:
  # Database used by the spatial_qa dataset (existing dataset)
  postgres:
    host: "10.132.80.204"
    port: 5432
    database: "postgres"
    user: "postgres"
    password: "123456"
    
    # Connection pool configuration
    pool:
      min_connections: 1
      max_connections: 10
      
    # Timeout configuration in seconds
    timeout:
      query_timeout: 60
      connection_timeout: 10
  
  # Dedicated database used by the spatialsql_pg dataset
  spatial_sql:
    host: "10.132.80.204"
    port: 5432
    database: "spatial_sql"
    user: "postgres"
    password: "123456"
    
    # Connection pool configuration
    pool:
      min_connections: 1
      max_connections: 10
      
    # Timeout configuration in seconds
    timeout:
      query_timeout: 60
      connection_timeout: 10

  floodsql:
    host: "10.132.80.204"
    port: 5432
    database: "floodsql"
    user: "postgres"
    password: "123456"

    pool:
      min_connections: 1
      max_connections: 10

    timeout:
      query_timeout: 60
      connection_timeout: 10

# Backward-compatible default database configuration (points to postgres)
database:
  host: "10.132.80.204"
  port: 5432
  database: "postgres"
  user: "postgres"
  password: "123456"
  
  # Connection pool configuration
  pool:
    min_connections: 1
    max_connections: 10
    
  # Timeout configuration in seconds
  timeout:
    query_timeout: 60
    connection_timeout: 10
